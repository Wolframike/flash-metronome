<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Flash Metronome</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0a0a0a; }
  body { font-family: -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", sans-serif; touch-action: manipulation; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  #pendulum {
    position: fixed;
    top: 0;
    left: calc(50% - 1.5px);
    width: 3px;
    height: min(55vh, 60vw);
    background: #e8e8e8;
    box-shadow: 0 0 12px rgba(232, 232, 232, 0.3);
    transform-origin: top center;
    transform: rotate(0deg);
    will-change: transform, filter;
    pointer-events: none;
    transition: filter 70ms ease-out;
  }
  #pendulum.beat {
    filter: brightness(1.55) drop-shadow(0 0 10px rgba(255, 215, 110, 0.85));
  }
  #pendulum::before {
    content: '';
    position: absolute;
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #555;
  }
  #pendulum::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%) scale(1);
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #f0f0f0;
    box-shadow: 0 0 20px rgba(240, 240, 240, 0.45);
    transition: transform 90ms ease-out, box-shadow 90ms ease-out, background 90ms ease-out;
  }
  #pendulum.beat::after {
    transform: translateX(-50%) scale(2.4);
    background: #ffbf2b;
    box-shadow: 0 0 65px rgba(255, 190, 70, 1), 0 0 130px rgba(255, 170, 50, 0.7);
  }
  #pulse-ring {
    position: absolute;
    bottom: -12px;
    left: 50%;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 3px solid rgba(255, 215, 110, 0);
    transform: translateX(-50%) scale(1);
    pointer-events: none;
  }
  #pulse-ring.fire {
    animation: ringPulse 520ms cubic-bezier(0.18, 0.7, 0.3, 1) forwards;
  }
  @keyframes ringPulse {
    0%   { transform: translateX(-50%) scale(0.35); border-color: rgba(255, 195, 80, 1);   border-width: 7px; }
    50%  { transform: translateX(-50%) scale(4);    border-color: rgba(255, 195, 80, 0.55); border-width: 3px; }
    100% { transform: translateX(-50%) scale(9);    border-color: rgba(255, 195, 80, 0);   border-width: 1px; }
  }
  #beat-flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(circle at center,
      rgba(255, 195, 80, 0.32) 0%,
      rgba(255, 195, 80, 0.10) 40%,
      rgba(255, 195, 80, 0) 78%);
    opacity: 0;
    will-change: opacity;
  }
  #beat-flash.fire {
    animation: flashFade 360ms cubic-bezier(0.2, 0.5, 0.4, 1) forwards;
  }
  @keyframes flashFade {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }
  #hud {
    position: fixed;
    bottom: max(env(safe-area-inset-bottom), 16px);
    right: max(env(safe-area-inset-right), 16px);
    color: #888;
    mix-blend-mode: difference;
    font-variant-numeric: tabular-nums;
    line-height: 1.3;
    opacity: 0;
    transition: opacity 400ms ease;
    pointer-events: none;
    text-align: right;
    user-select: none;
  }
  #hud.visible { opacity: 1; }
  #bpm { font-size: 22px; color: #ccc; }
  #hint { font-size: 11px; color: #777; margin-top: 2px; }
  @media (pointer: coarse) and (hover: none) {
    #hint .kbd { display: none; }
  }
  #err {
    position: fixed;
    top: max(env(safe-area-inset-top), 16px);
    left: 50%;
    transform: translateX(-50%);
    color: #d44;
    mix-blend-mode: difference;
    font-size: 12px;
    opacity: 0;
    transition: opacity 500ms ease;
    pointer-events: none;
    user-select: none;
  }
  #err.visible { opacity: 1; }
</style>
</head>
<body>
  <div id="beat-flash"></div>
  <div id="pendulum"><div id="pulse-ring"></div></div>
  <div id="hud">
    <div id="bpm">120 BPM</div>
    <div id="hint"><span>tap: tempo</span><span class="kbd"> &middot; &uarr;&darr; &plusmn;1 &middot; &larr;&rarr; &plusmn;10 &middot; space: pause</span></div>
  </div>
  <div id="err"></div>
<script>
(() => {
  const MIN_BPM = 30, MAX_BPM = 300, DEFAULT_BPM = 120;
  const TAP_RESET_MS = 2000;
  const TAP_MAX_HISTORY = 6;
  const MAX_ANGLE_DEG = 28;
  const BEAT_CLASS_MS = 140;
  const DWELL_HALF = 0.05;
  const pendulum = document.getElementById('pendulum');
  const pulseRing = document.getElementById('pulse-ring');
  const beatFlash = document.getElementById('beat-flash');
  const bpmEl = document.getElementById('bpm');
  const hud = document.getElementById('hud');
  const errEl = document.getElementById('err');

  let bpm = DEFAULT_BPM;
  let paused = false;
  let hudTimer = 0;
  let errTimer = 0;
  let beatClassTimer = 0;
  let phaseAnchor = 0;
  let frozenPhase = null;
  let lastPhase = 0.9;
  let tapTimes = [];
  let wakeLock = null;
  let wakeLockPending = false;

  const clamp = (n) => Math.max(MIN_BPM, Math.min(MAX_BPM, n));
  const periodMs = () => 120000 / bpm;
  const getPhase = (now) => {
    const P = periodMs();
    return ((now - phaseAnchor) % P + P) % P / P;
  };
  const setPhase = (now, phi) => { phaseAnchor = now - phi * periodMs(); };
  const angleForPhase = (phi) => {
    if (phi < DWELL_HALF || phi >= 1 - DWELL_HALF) return MAX_ANGLE_DEG;
    if (phi >= 0.5 - DWELL_HALF && phi < 0.5 + DWELL_HALF) return -MAX_ANGLE_DEG;
    if (phi < 0.5 - DWELL_HALF) {
      const t = (phi - DWELL_HALF) / (0.5 - 2 * DWELL_HALF);
      return MAX_ANGLE_DEG * Math.cos(t * Math.PI);
    }
    const t = (phi - 0.5 - DWELL_HALF) / (0.5 - 2 * DWELL_HALF);
    return -MAX_ANGLE_DEG * Math.cos(t * Math.PI);
  };

  async function requestWakeLock() {
    if (!('wakeLock' in navigator) || wakeLock || wakeLockPending) return;
    wakeLockPending = true;
    try {
      const lock = await navigator.wakeLock.request('screen');
      wakeLock = lock;
      lock.addEventListener('release', () => {
        if (wakeLock === lock) wakeLock = null;
      });
    } catch (_) {
      /* not granted; ignore */
    } finally {
      wakeLockPending = false;
    }
  }

  function parseHash() {
    const rawEncoded = location.hash.slice(1);
    let raw;
    try {
      raw = decodeURIComponent(rawEncoded).trim();
    } catch (_) {
      return { bpm: DEFAULT_BPM, error: `invalid BPM "${rawEncoded}" — using ${DEFAULT_BPM}` };
    }
    if (!raw) return { bpm: DEFAULT_BPM, error: null };
    if (!/^\d+$/.test(raw)) {
      return { bpm: DEFAULT_BPM, error: `invalid BPM "${raw}" — using ${DEFAULT_BPM}` };
    }
    const n = Number(raw);
    const c = clamp(n);
    if (c !== n) return { bpm: c, error: `BPM clamped to ${c}` };
    return { bpm: c, error: null };
  }

  function showHud() {
    hud.classList.add('visible');
    clearTimeout(hudTimer);
    hudTimer = setTimeout(() => hud.classList.remove('visible'), 2000);
  }

  function showErr(msg) {
    errEl.textContent = msg;
    errEl.classList.add('visible');
    clearTimeout(errTimer);
    errTimer = setTimeout(() => errEl.classList.remove('visible'), 3000);
  }

  function renderBpm() {
    bpmEl.textContent = paused ? `${bpm} BPM · paused` : `${bpm} BPM`;
  }

  function writeHash() {
    history.replaceState(null, '', `#${bpm}`);
  }

  function setBpm(n) {
    const c = clamp(n);
    if (c === bpm) { showHud(); return; }
    if (paused) {
      bpm = c;
    } else {
      const now = performance.now();
      const phi = getPhase(now);
      bpm = c;
      setPhase(now, phi);
    }
    renderBpm();
    showHud();
    writeHash();
  }

  function handleTap(now) {
    requestWakeLock();
    if (tapTimes.length && now - tapTimes[tapTimes.length - 1] > TAP_RESET_MS) {
      tapTimes = [];
    }
    tapTimes.push(now);
    if (tapTimes.length > TAP_MAX_HISTORY) tapTimes.shift();
    showHud();
    if (tapTimes.length < 2) return;
    const span = tapTimes[tapTimes.length - 1] - tapTimes[0];
    const avgInterval = span / (tapTimes.length - 1);
    const newBpm = Math.round(60000 / avgInterval);
    paused = false;
    frozenPhase = null;
    bpm = clamp(newBpm);
    setPhase(now, 0);
    lastPhase = 0;
    fireBeat();
    renderBpm();
    writeHash();
  }

  function applyHash() {
    const { bpm: b, error } = parseHash();
    if (b !== bpm) {
      if (paused) {
        bpm = b;
      } else {
        const now = performance.now();
        const phi = getPhase(now);
        bpm = b;
        setPhase(now, phi);
      }
    }
    if (error) showErr(error);
    renderBpm();
    showHud();
  }

  function fireBeat() {
    pendulum.classList.add('beat');
    clearTimeout(beatClassTimer);
    beatClassTimer = setTimeout(() => pendulum.classList.remove('beat'), BEAT_CLASS_MS);
    pulseRing.classList.remove('fire');
    beatFlash.classList.remove('fire');
    void pulseRing.offsetWidth;
    pulseRing.classList.add('fire');
    beatFlash.classList.add('fire');
  }

  function tick(now) {
    if (!paused) {
      const phi = getPhase(now);
      const rightEntry = 1 - DWELL_HALF;
      const leftEntry = 0.5 - DWELL_HALF;
      if ((lastPhase < rightEntry && phi >= rightEntry) ||
          (lastPhase < leftEntry  && phi >= leftEntry)) {
        fireBeat();
      }
      lastPhase = phi;
      pendulum.style.transform = `rotate(${angleForPhase(phi)}deg)`;
    }
    requestAnimationFrame(tick);
  }

  phaseAnchor = performance.now();
  applyHash();
  fireBeat();
  requestAnimationFrame(tick);

  window.addEventListener('hashchange', applyHash);
  window.addEventListener('mousemove', showHud, { passive: true });
  window.addEventListener('pointerdown', (e) => {
    handleTap(performance.now());
    e.preventDefault();
  });

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });

  window.addEventListener('keydown', (e) => {
    requestWakeLock();
    switch (e.key) {
      case 'ArrowUp':    setBpm(bpm + 1);  e.preventDefault(); break;
      case 'ArrowDown':  setBpm(bpm - 1);  e.preventDefault(); break;
      case 'ArrowRight': setBpm(bpm + 10); e.preventDefault(); break;
      case 'ArrowLeft':  setBpm(bpm - 10); e.preventDefault(); break;
      case ' ':
      case 'Spacebar':
        if (paused) {
          if (frozenPhase !== null) setPhase(performance.now(), frozenPhase);
          frozenPhase = null;
          paused = false;
        } else {
          frozenPhase = getPhase(performance.now());
          paused = true;
        }
        renderBpm();
        showHud();
        e.preventDefault();
        break;
    }
  });
})();
</script>
</body>
</html>
