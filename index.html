<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Flash Metronome</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0a0a0a; }
  body { font-family: -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", sans-serif; touch-action: manipulation; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
  #pendulum {
    position: fixed;
    top: 0;
    left: calc(50% - 1.5px);
    width: 3px;
    height: min(55vh, 60vw);
    background: #e8e8e8;
    box-shadow: 0 0 12px rgba(232, 232, 232, 0.3);
    transform-origin: top center;
    transform: rotate(0deg);
    will-change: transform;
    pointer-events: none;
  }
  #pendulum::before {
    content: '';
    position: absolute;
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: #555;
  }
  #pendulum::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #f0f0f0;
    box-shadow: 0 0 18px rgba(240, 240, 240, 0.55);
  }
  #hud {
    position: fixed;
    bottom: max(env(safe-area-inset-bottom), 16px);
    right: max(env(safe-area-inset-right), 16px);
    color: #888;
    mix-blend-mode: difference;
    font-variant-numeric: tabular-nums;
    line-height: 1.3;
    opacity: 0;
    transition: opacity 400ms ease;
    pointer-events: none;
    text-align: right;
    user-select: none;
  }
  #hud.visible { opacity: 1; }
  #bpm { font-size: 22px; color: #ccc; }
  #hint { font-size: 11px; color: #777; margin-top: 2px; }
  @media (pointer: coarse) and (hover: none) {
    #hint .kbd { display: none; }
  }
  #err {
    position: fixed;
    top: max(env(safe-area-inset-top), 16px);
    left: 50%;
    transform: translateX(-50%);
    color: #d44;
    mix-blend-mode: difference;
    font-size: 12px;
    opacity: 0;
    transition: opacity 500ms ease;
    pointer-events: none;
    user-select: none;
  }
  #err.visible { opacity: 1; }
</style>
</head>
<body>
  <div id="pendulum"></div>
  <div id="hud">
    <div id="bpm">120 BPM</div>
    <div id="hint"><span>tap: tempo</span><span class="kbd"> &middot; &uarr;&darr; &plusmn;1 &middot; &larr;&rarr; &plusmn;10 &middot; space: pause</span></div>
  </div>
  <div id="err"></div>
<script>
(() => {
  const MIN_BPM = 30, MAX_BPM = 300, DEFAULT_BPM = 120;
  const TAP_RESET_MS = 2000;
  const TAP_MAX_HISTORY = 6;
  const MAX_ANGLE_DEG = 28;
  const pendulum = document.getElementById('pendulum');
  const bpmEl = document.getElementById('bpm');
  const hud = document.getElementById('hud');
  const errEl = document.getElementById('err');

  let bpm = DEFAULT_BPM;
  let paused = false;
  let hudTimer = 0;
  let errTimer = 0;
  let phaseAnchor = 0;
  let frozenPhase = null;
  let tapTimes = [];
  let wakeLock = null;
  let wakeLockPending = false;

  const clamp = (n) => Math.max(MIN_BPM, Math.min(MAX_BPM, n));
  const periodMs = () => 120000 / bpm;
  const getPhase = (now) => {
    const P = periodMs();
    return ((now - phaseAnchor) % P + P) % P / P;
  };
  const setPhase = (now, phi) => { phaseAnchor = now - phi * periodMs(); };

  async function requestWakeLock() {
    if (!('wakeLock' in navigator) || wakeLock || wakeLockPending) return;
    wakeLockPending = true;
    try {
      const lock = await navigator.wakeLock.request('screen');
      wakeLock = lock;
      lock.addEventListener('release', () => {
        if (wakeLock === lock) wakeLock = null;
      });
    } catch (_) {
      /* not granted; ignore */
    } finally {
      wakeLockPending = false;
    }
  }

  function parseHash() {
    const rawEncoded = location.hash.slice(1);
    let raw;
    try {
      raw = decodeURIComponent(rawEncoded).trim();
    } catch (_) {
      return { bpm: DEFAULT_BPM, error: `invalid BPM "${rawEncoded}" — using ${DEFAULT_BPM}` };
    }
    if (!raw) return { bpm: DEFAULT_BPM, error: null };
    if (!/^\d+$/.test(raw)) {
      return { bpm: DEFAULT_BPM, error: `invalid BPM "${raw}" — using ${DEFAULT_BPM}` };
    }
    const n = Number(raw);
    const c = clamp(n);
    if (c !== n) return { bpm: c, error: `BPM clamped to ${c}` };
    return { bpm: c, error: null };
  }

  function showHud() {
    hud.classList.add('visible');
    clearTimeout(hudTimer);
    hudTimer = setTimeout(() => hud.classList.remove('visible'), 2000);
  }

  function showErr(msg) {
    errEl.textContent = msg;
    errEl.classList.add('visible');
    clearTimeout(errTimer);
    errTimer = setTimeout(() => errEl.classList.remove('visible'), 3000);
  }

  function renderBpm() {
    bpmEl.textContent = paused ? `${bpm} BPM · paused` : `${bpm} BPM`;
  }

  function writeHash() {
    history.replaceState(null, '', `#${bpm}`);
  }

  function setBpm(n) {
    const c = clamp(n);
    if (c === bpm) { showHud(); return; }
    if (paused) {
      bpm = c;
    } else {
      const now = performance.now();
      const phi = getPhase(now);
      bpm = c;
      setPhase(now, phi);
    }
    renderBpm();
    showHud();
    writeHash();
  }

  function handleTap(now) {
    requestWakeLock();
    if (tapTimes.length && now - tapTimes[tapTimes.length - 1] > TAP_RESET_MS) {
      tapTimes = [];
    }
    tapTimes.push(now);
    if (tapTimes.length > TAP_MAX_HISTORY) tapTimes.shift();
    showHud();
    if (tapTimes.length < 2) return;
    const span = tapTimes[tapTimes.length - 1] - tapTimes[0];
    const avgInterval = span / (tapTimes.length - 1);
    const newBpm = Math.round(60000 / avgInterval);
    paused = false;
    frozenPhase = null;
    bpm = clamp(newBpm);
    setPhase(now, 0);
    renderBpm();
    writeHash();
  }

  function applyHash() {
    const { bpm: b, error } = parseHash();
    if (b !== bpm) {
      if (paused) {
        bpm = b;
      } else {
        const now = performance.now();
        const phi = getPhase(now);
        bpm = b;
        setPhase(now, phi);
      }
    }
    if (error) showErr(error);
    renderBpm();
    showHud();
  }

  function tick(now) {
    if (!paused) {
      const phi = getPhase(now);
      const angle = MAX_ANGLE_DEG * Math.cos(2 * Math.PI * phi);
      pendulum.style.transform = `rotate(${angle}deg)`;
    }
    requestAnimationFrame(tick);
  }

  phaseAnchor = performance.now();
  applyHash();
  requestAnimationFrame(tick);

  window.addEventListener('hashchange', applyHash);
  window.addEventListener('mousemove', showHud, { passive: true });
  window.addEventListener('pointerdown', (e) => {
    handleTap(performance.now());
    e.preventDefault();
  });

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
  });

  window.addEventListener('keydown', (e) => {
    requestWakeLock();
    switch (e.key) {
      case 'ArrowUp':    setBpm(bpm + 1);  e.preventDefault(); break;
      case 'ArrowDown':  setBpm(bpm - 1);  e.preventDefault(); break;
      case 'ArrowRight': setBpm(bpm + 10); e.preventDefault(); break;
      case 'ArrowLeft':  setBpm(bpm - 10); e.preventDefault(); break;
      case ' ':
      case 'Spacebar':
        if (paused) {
          if (frozenPhase !== null) setPhase(performance.now(), frozenPhase);
          frozenPhase = null;
          paused = false;
        } else {
          frozenPhase = getPhase(performance.now());
          paused = true;
        }
        renderBpm();
        showHud();
        e.preventDefault();
        break;
    }
  });
})();
</script>
</body>
</html>
